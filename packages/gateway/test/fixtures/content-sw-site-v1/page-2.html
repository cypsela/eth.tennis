<!doctype html>
<html><head></head><body>
  <h1 id="title">page-2</h1>
  <pre id="result"></pre>
  <script>
    fetch('/api/data').then(async r =>
      document.getElementById('result').textContent =
        'absorbed=' + r.headers.get('x-absorbed')
        + ';version=' + r.headers.get('x-version')
        + ';body=' + (await r.text()));
  </script>
</body></html>
