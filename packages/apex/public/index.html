<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>eth.tennis</title>
    <style>
      :root {
        --bg: #000;
        --fg: #e0e0e0;
        --dim: #606060;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        line-height: 1.5;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.5rem, 6vw, 2.5rem);
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        color: var(--dim);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>eth.tennis 🎾</h1>
        <p>serving that shit</p>
      </div>
    </main>
  </body>
</html>
